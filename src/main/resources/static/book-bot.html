<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookBot — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0e0c0a;--surface:#191610;--surface2:#221e17;--border:#2e2820;
    --accent:#c9a84c;--accent2:#e8c97a;--text:#f0e8d8;--muted:#7a6e5e;
    --bot-bubble:#1d1a13;--user-bubble:#2a2215;--glow:rgba(201,168,76,0.15);--error:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}

  header{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(14,12,10,0.95);backdrop-filter:blur(12px);z-index:10}
  .logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#8a6a20);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(201,168,76,0.3)}
  .header-text h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent2)}
  .header-text p{font-size:.7rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
  .model-badge{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.72rem;color:var(--muted)}
  .model-badge span{color:var(--accent2);font-weight:500}
  .live-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .suggestions{display:flex;gap:8px;padding:10px 24px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
  .suggestions::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:.73rem;padding:5px 13px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
  .chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(201,168,76,.08)}

  #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .message{display:flex;gap:12px;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{flex-direction:row-reverse;align-self:flex-end;max-width:75%}
  .message.bot{align-self:flex-start;max-width:85%}
  .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .bot .avatar{background:linear-gradient(135deg,#2a2215,#3a3020);border:1px solid var(--accent)}
  .user .avatar{background:var(--surface2);border:1px solid var(--border)}
  .bubble{padding:12px 16px;border-radius:16px;line-height:1.65;font-size:.9rem}
  .bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-top-left-radius:4px}
  .user .bubble{background:var(--user-bubble);border:1px solid rgba(201,168,76,.2);border-top-right-radius:4px}
  .bubble strong{color:var(--accent2);font-weight:500}
  .bubble em{font-family:'Playfair Display',serif;font-style:italic}
  .bubble ul{padding-left:18px;margin-top:6px}
  .bubble li{margin-bottom:4px;color:#c8bfad}
  .bubble h4{font-family:'Playfair Display',serif;color:var(--accent2);font-size:.95rem;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
  .bubble code{background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:.82rem;color:var(--accent)}

  .typing .bubble{display:flex;align-items:center;gap:5px;padding:14px 18px}
  .dot-anim{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
  .dot-anim:nth-child(2){animation-delay:.2s}.dot-anim:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

  footer{padding:14px 24px 18px;border-top:1px solid var(--border);background:rgba(14,12,10,.95);backdrop-filter:blur(12px);z-index:10}
  .input-row{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:9px 12px;transition:border-color .2s}
  .input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
  #input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;resize:none;max-height:100px;line-height:1.5;padding:2px 0}
  #input::placeholder{color:var(--muted)}
  #send{background:linear-gradient(135deg,var(--accent),#8a6a20);border:none;border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .1s;color:#0e0c0a}
  #send:hover{opacity:.85;transform:scale(1.05)}
  #send:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .hint{text-align:center;font-size:.68rem;color:var(--muted);margin-top:7px}
</style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <div class="header-text">
    <h1>BookBot</h1>
    <p>Powered by your database</p>
  </div>
  <div class="model-badge">
    <div class="live-dot"></div>
    Spring AI · <span>llama3</span>
  </div>
</header>

<div class="suggestions">
  <button class="chip" onclick="sendChip(this)">📚 Show all books</button>
  <button class="chip" onclick="sendChip(this)">🖊️ List all authors</button>
  <button class="chip" onclick="sendChip(this)">🗂️ What categories exist?</button>
  <button class="chip" onclick="sendChip(this)">📖 How many books do we have?</button>
  <button class="chip" onclick="sendChip(this)">🔍 Which author wrote the most books?</button>
  <button class="chip" onclick="sendChip(this)">🏷️ Books grouped by category</button>
</div>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask about your books, authors, or categories…"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send" onclick="sendMessage()" title="Send">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">🦙 Browser → Spring Boot → Spring AI → Ollama llama3 → Your Database</p>
</footer>

<script>
  const API_BASE = 'http://localhost:8080'; // change if needed

  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function appendMessage(role, html, isTyping = false) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}${isTyping ? ' typing' : ''}`;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '📚' : '👤';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;
    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendChip(btn) {
    input.value = btn.textContent.replace(/^\S+\s/, '');
    sendMessage();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', escHtml(text));

    const typing = appendMessage('bot',
      '<div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div>', true);

    try {
      // Calls your Spring Boot → Spring AI → Ollama llama3
      const res = await fetch(`${API_BASE}/api/v1/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      typing.remove();
      appendMessage('bot', mdHtml(data.answer));

    } catch (err) {
      typing.remove();
      appendMessage('bot',
        `<strong style="color:var(--error)">Could not reach your Spring Boot API.</strong><br><br>` +
        `Make sure:<br>` +
        `• Spring Boot is running → <code>./gradlew bootRun</code><br>` +
        `• Ollama is running → <code>ollama serve</code><br>` +
        `• llama3 is pulled → <code>ollama pull llama3</code>`
      );
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function mdHtml(t) {
    return t
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^#{1,4} (.+)$/gm, '<h4>$1</h4>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  appendMessage('bot',
    `<h4>Welcome to BookBot 📚</h4>` +
    `I'm powered by <strong>Spring AI + Ollama llama3</strong> and read <strong>your real database</strong>.<br><br>` +
    `Ask me anything about your books, authors, or categories!`
  );
</script>
</body>
</html>
